<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Grid Test</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/mobile-weibo.css">
    <style>
        body { padding: 40px; background: #f5f5f5; }
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 30px; }
        .debug-info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>PC端Grid布局测试 - 7张图片</h1>

        <div class="debug-info">
            <strong>Grid配置：</strong> grid-template-columns: repeat(3, minmax(0, 1fr))<br>
            <strong>预期行为：</strong> 3列布局，每张图片最大200x200px，无重叠
        </div>

        <div class="posts-list">
            <article class="post-card">
                <h2>测试文章 - 7张图片</h2>
                <div class="post-card-media post-card-media--grid-9 post-card-media--count-7">
                    <div class="post-card-media-item">
                        <img src="/static/uploads/optimized/632da1f5f5f9291f6f5c729351b78c47_medium.webp" alt="">
                    </div>
                    <div class="post-card-media-item">
                        <img src="/static/uploads/optimized/8e1890066b6975ba86b449e11eeaaf36_medium.webp" alt="">
                    </div>
                    <div class="post-card-media-item">
                        <img src="/static/uploads/optimized/370b31ea0bc77b08f56c3799687e4214_medium.webp" alt="">
                    </div>
                    <div class="post-card-media-item">
                        <img src="/static/uploads/optimized/5c7c6c0579b4967e6b649a031cecc31d_medium.webp" alt="">
                    </div>
                    <div class="post-card-media-item">
                        <img src="/static/uploads/optimized/d682e4e32bb8b0d6a20dbc4a45ba4990_medium.webp" alt="">
                    </div>
                    <div class="post-card-media-item">
                        <img src="/static/uploads/optimized/632da1f5f5f9291f6f5c729351b78c47_medium.webp" alt="">
                    </div>
                    <div class="post-card-media-item">
                        <img src="/static/uploads/optimized/8e1890066b6975ba86b449e11eeaaf36_medium.webp" alt="">
                    </div>
                </div>
            </article>
        </div>
    </div>
</body>
</html>
